<svg xmlns="http://www.w3.org/2000/svg" width="794" height="1123" viewBox="0 0 794 1123">
  <rect width="794" height="1123" fill="#ffffff"/>
  <defs>
    <style>
      .boundary { fill:#ffffff; stroke:#111111; stroke-width:1.2; }
      .ellipse { fill:#ffffff; stroke:#111111; stroke-width:1.25; }
      .line { stroke:#111111; stroke-width:1.2; fill:none; }
      .dash { stroke:#111111; stroke-width:1; fill:none; stroke-dasharray:5 4; marker-end:url(#arrow); }
      .title { font-family:"Times New Roman", serif; font-size:16px; font-weight:700; fill:#111111; }
      .label { font-family:"Times New Roman", serif; font-size:14px; fill:#111111; }
      .small { font-family:"Times New Roman", serif; font-size:12px; fill:#111111; }
      .actorText { font-family:"Times New Roman", serif; font-size:13px; font-weight:700; fill:#111111; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#111111"/>
    </marker>
  </defs>

  <text x="397" y="34" text-anchor="middle" class="title">Sơ đồ Use Case tổng quát</text>

  <rect x="145" y="72" width="504" height="765" class="boundary"/>
  <text x="397" y="100" text-anchor="middle" class="title">Hệ thống quản lý sự kiện</text>

  <!-- Actors -->
  <circle cx="73" cy="230" r="14" fill="#ffffff" stroke="#111111" stroke-width="1.2"/>
  <path d="M73 244 L73 292 M47 261 L99 261 M73 292 L51 331 M73 292 L95 331" class="line"/>
  <text x="73" y="356" text-anchor="middle" class="actorText">Quản trị viên</text>

  <circle cx="721" cy="230" r="14" fill="#ffffff" stroke="#111111" stroke-width="1.2"/>
  <path d="M721 244 L721 292 M695 261 L747 261 M721 292 L699 331 M721 292 L743 331" class="line"/>
  <text x="721" y="356" text-anchor="middle" class="actorText">Sinh viên</text>

  <!-- Use cases -->
  <ellipse cx="397" cy="160" rx="115" ry="32" class="ellipse"/>
  <text x="397" y="156" text-anchor="middle" class="label">Xác thực và</text>
  <text x="397" y="173" text-anchor="middle" class="label">quản lý tài khoản</text>

  <ellipse cx="290" cy="260" rx="115" ry="32" class="ellipse"/>
  <text x="290" y="256" text-anchor="middle" class="label">Quản lý sự kiện</text>
  <text x="290" y="273" text-anchor="middle" class="label">và bài đăng</text>

  <ellipse cx="504" cy="260" rx="115" ry="32" class="ellipse"/>
  <text x="504" y="256" text-anchor="middle" class="label">Tra cứu và đăng ký</text>
  <text x="504" y="273" text-anchor="middle" class="label">sự kiện</text>

  <ellipse cx="290" cy="365" rx="115" ry="32" class="ellipse"/>
  <text x="290" y="361" text-anchor="middle" class="label">Quản lý đăng ký</text>
  <text x="290" y="378" text-anchor="middle" class="label">và điểm danh</text>

  <ellipse cx="504" cy="365" rx="115" ry="32" class="ellipse"/>
  <text x="504" y="361" text-anchor="middle" class="label">Điểm danh QR</text>
  <text x="504" y="378" text-anchor="middle" class="label">và lịch sử tham gia</text>

  <ellipse cx="290" cy="470" rx="115" ry="32" class="ellipse"/>
  <text x="290" y="466" text-anchor="middle" class="label">Quản lý điểm</text>
  <text x="290" y="483" text-anchor="middle" class="label">rèn luyện</text>

  <ellipse cx="504" cy="470" rx="115" ry="32" class="ellipse"/>
  <text x="504" y="466" text-anchor="middle" class="label">Xem điểm và</text>
  <text x="504" y="483" text-anchor="middle" class="label">nhận thông báo</text>

  <ellipse cx="290" cy="575" rx="115" ry="32" class="ellipse"/>
  <text x="290" y="571" text-anchor="middle" class="label">Báo cáo, thống kê</text>
  <text x="290" y="588" text-anchor="middle" class="label">và xuất Excel</text>

  <ellipse cx="504" cy="575" rx="115" ry="32" class="ellipse"/>
  <text x="504" y="571" text-anchor="middle" class="label">Bầu cử trực tuyến</text>
  <text x="504" y="588" text-anchor="middle" class="label">và chatbot</text>

  <ellipse cx="397" cy="690" rx="125" ry="32" class="ellipse"/>
  <text x="397" y="686" text-anchor="middle" class="label">Quản lý media, email</text>
  <text x="397" y="703" text-anchor="middle" class="label">và nhật ký hoạt động</text>

  <!-- Admin associations -->
  <path d="M104 261 L282 160" class="line"/>
  <path d="M104 261 L176 260" class="line"/>
  <path d="M104 261 L176 365" class="line"/>
  <path d="M104 261 L176 470" class="line"/>
  <path d="M104 261 L176 575" class="line"/>
  <path d="M104 261 L272 690" class="line"/>
  <path d="M104 261 L389 575" class="line"/>

  <!-- Student associations -->
  <path d="M690 261 L512 160" class="line"/>
  <path d="M690 261 L619 260" class="line"/>
  <path d="M690 261 L619 365" class="line"/>
  <path d="M690 261 L619 470" class="line"/>
  <path d="M690 261 L619 575" class="line"/>

  <!-- Minimal relationships -->
  <path d="M504 333 L504 292" class="dash"/>
  <text x="521" y="318" class="small">&lt;&lt;include&gt;&gt;</text>
  <path d="M397 658 L333 600" class="dash"/>
  <text x="353" y="632" class="small">&lt;&lt;include&gt;&gt;</text>

  <text x="397" y="884" text-anchor="middle" class="small">Hình: Sơ đồ Use Case tổng quát của hệ thống quản lý sự kiện</text>
</svg>
