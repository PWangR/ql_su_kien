x-laravel-env: &laravel-env
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost:${APP_PORT:-8080}
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: ${QLSK_DB_DATABASE:-ql_su_kien}
  DB_USERNAME: root
  DB_PASSWORD: ${QLSK_DB_ROOT_PASSWORD:-root}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  CACHE_DRIVER: file
  QUEUE_CONNECTION: sync

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ql-su-kien:latest
    container_name: ql-su-kien-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      <<: *laravel-env
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    networks:
      - ql-su-kien-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: ql-su-kien:latest
    container_name: ql-su-kien-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    environment:
      <<: *laravel-env
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    networks:
      - ql-su-kien-net
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  node:
    image: node:18-alpine
    container_name: ql-su-kien-node
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "npm ci && npm run dev"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    networks:
      - ql-su-kien-net

  db:
    image: mysql:8.0
    container_name: ql-su-kien-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${QLSK_DB_DATABASE:-ql_su_kien}
      MYSQL_ROOT_PASSWORD: ${QLSK_DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ql-su-kien-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${QLSK_DB_ROOT_PASSWORD:-root}"]
      timeout: 20s
      retries: 10

  nginx:
    image: nginx:alpine
    container_name: ql-su-kien-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - ql-su-kien-net
    depends_on:
      app:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: ql-su-kien-redis
    restart: unless-stopped
    ports:
      - "${REDIS_FORWARD_PORT:-6380}:6379"
    networks:
      - ql-su-kien-net

volumes:
  dbdata:
  vendor:
  node_modules:

networks:
  ql-su-kien-net:
    driver: bridge
