<svg xmlns="http://www.w3.org/2000/svg" width="794" height="1123" viewBox="0 0 794 1123">
  <rect width="794" height="1123" fill="#ffffff"/>
  <defs>
    <style>
      .box { fill:#ffffff; stroke:#111111; stroke-width:1.2; }
      .title { font-family:"Times New Roman", serif; font-size:15px; font-weight:700; fill:#111111; }
      .text { font-family:"Times New Roman", serif; font-size:13px; fill:#111111; }
      .small { font-family:"Times New Roman", serif; font-size:12.5px; fill:#111111; }
      .line { stroke:#111111; stroke-width:1.2; fill:none; marker-end:url(#arrow); }
      .plain { stroke:#111111; stroke-width:1.2; fill:none; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#111111"/>
    </marker>
  </defs>

  <text x="397" y="24" text-anchor="middle" class="title">Sơ đồ phân rã chức năng BFD</text>

