  <!-- Row 1 bus -->
  <path d="M397 92 L397 120" class="plain"/>
  <path d="M125 120 L665 120" class="plain"/>
  <path d="M125 120 L125 145" class="line"/>
  <path d="M305 120 L305 145" class="line"/>
  <path d="M485 120 L485 145" class="line"/>
